<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Shiran.K</div>
        <nav><a href="index.html">Home</a><a href="about.html">About Me</a><a href="skills.html">Skills</a><a href="projects.html">Projects</a><a href="contact.html" class="active">Contact</a></nav>
    </header>
    <section>
        <h2 class="section-title">Contact Me</h2>
        <div class="contact-container">
            <div class="contact-info">
                <h3>Get In Touch</h3>
                <div class="contact-item" style="margin-top:20px;"><i class="fas fa-envelope"></i><span>christyshiran10@gmail.com</span></div>
                <div class="contact-item"><i class="fas fa-map-marker-alt"></i><span>Colombo, Sri Lanka</span></div>
            </div>
            <div class="contact-form-wrapper">
                <form id="contactForm">
                    <input type="text" id="name" placeholder="Your Name" required>
                    <input type="email" id="email" placeholder="Your Email" required>
                    <textarea id="message" rows="4" placeholder="Your Message" required></textarea>
                    <button type="submit" class="btn" style="border:none; width:100%;">Send Message</button>
                </form>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
